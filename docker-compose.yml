services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  k2:
    build: ./model_servers/k2
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./model_servers/k2/.env

  hermes:
    build: ./model_servers/hermes
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./model_servers/hermes/.env

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=forseen
      - K2_BASE_URL=http://k2:8001
      - HERMES_BASE_URL=http://hermes:8002
    depends_on:
      - mongo
      - k2
      - hermes

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
